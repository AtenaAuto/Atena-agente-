name: ATENA CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# Permissões necessárias para evitar erros de escrita em relatórios
permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.10"
  
jobs:
  # Job 1: Linting e Code Quality
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 pylint ruff
    
    - name: Check code formatting with Black
      run: |
        black --check --diff core/ modules/ protocols/ || true
    
    - name: Check imports with isort
      run: |
        isort --check-only --diff core/ modules/ protocols/ || true
    
    - name: Lint with flake8
      run: |
        flake8 core/ modules/ protocols/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 core/ modules/ protocols/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
    
    - name: Lint with pylint
      run: |
        pylint core/ modules/ --fail-under=6.0 --disable=C0111,C0103 || true
    
    - name: Lint with ruff
      run: |
        ruff check core/ modules/ protocols/ || true

  # Job 2: Security Scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install security tools
      run: |
        pip install bandit safety
    
    - name: Run Bandit security scan
      run: |
        bandit -r core/ modules/ protocols/ -f json -o bandit-report.json || true
        bandit -r core/ modules/ protocols/ -ll
    
    - name: Check dependencies with Safety
      run: |
        pip install -r setup/requirements.txt || true
        safety check --json || true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: bandit-report.json

  # Job 3: Type Checking
  typecheck:
    name: Type Checking
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install mypy types-requests
        pip install -r setup/requirements.txt || true
    
    - name: Run mypy
      run: |
        mypy core/ modules/ --ignore-missing-imports --no-error-summary || true

  # Job 4: Unit Tests
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r setup/requirements.txt || true
        pip install pytest pytest-asyncio pytest-cov pytest-mock pytest-timeout
    
    - name: Run unit tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest tests/unit/ \
          -v \
          --cov=core \
          --cov=modules \
          --cov-report=xml \
          --maxfail=5 \
          --tb=short || true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.10'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  # Job 5: Integration Tests
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install -r setup/requirements.txt || true
        pip install pytest pytest-asyncio pytest-timeout
    
    - name: Run integration tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest tests/integration/ -v -m integration --tb=short || true
      timeout-minutes: 10

  # Job 6: Build Check
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install build tools
      run: |
        pip install build wheel setuptools
    
    - name: Build package
      run: |
        python -m build || echo "⚠️ Build não configurado ainda"

  # Job 7: Dependency Check
  dependencies:
    name: Dependency Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Check for dependency conflicts
      run: |
        pip install pip-tools
        pip install -r setup/requirements.txt || true
        pip check || echo "⚠️ Dependency conflicts detected"

  # Job 8: Documentation Check
  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check README
      run: |
        test -f README.md || (echo "❌ README.md not found" && exit 1)

  # Job Final: Status Report
  status:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs: [lint, security, typecheck, test, integration, build]
    if: always()
    
    steps:
    - name: Check pipeline status
      run: |
        echo "🚀 ATENA CI/CD Pipeline Complete!"
        echo "Lint: ${{ needs.lint.result }}"
        echo "Security: ${{ needs.security.result }}"
        echo "Type Check: ${{ needs.typecheck.result }}"
        echo "Tests: ${{ needs.test.result }}"
