# ══════════════════════════════════════════════════════════════════════════════
# ATENA Self-Evolve  —  workflow v2 (Refined)
# ══════════════════════════════════════════════════════════════════════════════

name: ATENA Self-Evolve

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      run_repo_watchlist:
        description: "Executar scanner de repositórios de IA"
        required: false
        default: "true"
        type: boolean
      skip_evolve:
        description: "Pular ciclo de evolução (só auditorias)"
        required: false
        default: "false"
        type: boolean
      debug:
        description: "Ativar saída verbose (ACTIONS_STEP_DEBUG)"
        required: false
        default: "false"
        type: boolean

permissions: {}

concurrency:
  group: atena-self-evolve-${{ github.ref_name }}
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_COLOR: "1"
  ATENA_AUTO_ENDPOINT_SETUP: "false"
  ATENA_STRICT_ENDPOINT_READY: "false"
  PYTHON_VERSION: "3.11"
  REQS_HASH: ${{ hashFiles('setup/requirements-pinned.txt', 'setup/requirements-dev.txt') }}

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 — setup
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  setup:
    name: "⚙️ Setup"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    outputs:
      venv-cache-key: ${{ steps.cache-key.outputs.key }}
      python-version: ${{ env.PYTHON_VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Compute venv cache key
        id: cache-key
        run: |
          KEY="venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ env.REQS_HASH }}"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"
          echo "Cache key: ${KEY}"

      - name: Restore venv cache
        id: cache-restore
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772b3dc2c31
        with:
          path: .venv
          key: ${{ steps.cache-key.outputs.key }}

      - name: Install dependencies
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip

          for attempt in 1 2 3; do
            echo "::group::pip install tentativa ${attempt}/3"
            if pip install -r setup/requirements-pinned.txt -r setup/requirements-dev.txt; then
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
            if [[ ${attempt} -lt 3 ]]; then
              echo "::warning::pip falhou na tentativa ${attempt}. Aguardando $((attempt * 15))s..."
              sleep $((attempt * 15))
            else
              echo "::error::pip install falhou após 3 tentativas."
              exit 1
            fi
          done

      - name: Sanity check
        run: |
          source .venv/bin/activate
          python -c "import sys; print(f'Python {sys.version}')"
          python -m pip list --format=freeze | wc -l | xargs -I{} echo "{} pacotes instalados"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — evolve
  # ════════════════════════════════════════════════════════════════════════════
  evolve:
    name: "🧬 Evolve"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: inputs.skip_evolve != 'true'
    permissions:
      contents: read

    outputs:
      status:     ${{ steps.evolve-status.outputs.status }}
      score-file: ${{ steps.score.outputs.file }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Restore venv
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772b3dc2c31
        with:
          path: .venv
          key: ${{ needs.setup.outputs.venv-cache-key }}

      - name: Agi-uplift
        id: agi-uplift
        continue-on-error: true
        run: |
          set -uo pipefail
          source .venv/bin/activate
          bash ./atena agi-uplift 2>&1 | tee /tmp/agi-uplift.log
          EXIT=${PIPESTATUS[0]}
          if [[ ${EXIT} -ne 0 ]]; then
            echo "::warning::agi-uplift terminou com código ${EXIT}"
          fi
          echo "exit_code=${EXIT}" >> "$GITHUB_OUTPUT"

      - name: Digital organism live cycle
        id: organism
        continue-on-error: true
        run: |
          set -uo pipefail
          source .venv/bin/activate
          bash ./atena digital-organism-live-cycle \
            --iterations 1 \
            --batches 1 \
            --recovery-attempts 1 \
            2>&1 | tee /tmp/organism.log
          EXIT=${PIPESTATUS[0]}
          if [[ ${EXIT} -ne 0 ]]; then
            echo "::warning::digital-organism-live-cycle terminou com código ${EXIT}"
          fi
          echo "exit_code=${EXIT}" >> "$GITHUB_OUTPUT"

      - name: Capture evolution status
        id: evolve-status
        run: |
          AGI=${{ steps.agi-uplift.outputs.exit_code || '0' }}
          ORG=${{ steps.organism.outputs.exit_code || '0' }}
          if [[ "${AGI}" -eq 0 && "${ORG}" -eq 0 ]]; then
            STATUS="success"
          elif [[ "${AGI}" -eq 0 || "${ORG}" -eq 0 ]]; then
            STATUS="partial"
          else
            STATUS="failure"
          fi
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "Evolução: ${STATUS} (agi=${AGI}, organism=${ORG})"

      - name: Extract score snapshot
        id: score
        run: |
          FILE="atena_evolution/atena_state.json"
          if [[ -f "${FILE}" ]]; then
            echo "file=${FILE}" >> "$GITHUB_OUTPUT"
            echo "Score atual:"
            python3 -c "
import json, pathlib
s = json.loads(pathlib.Path('${FILE}').read_text())
print(f'  generation : {s.get(\"generation\", \"?\")}')
print(f'  best_score : {s.get(\"best_score\", \"?\")}')
            "
          else
            echo "file=" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload evolution logs
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b
        with:
          name: evolution-logs-${{ github.run_id }}
          path: |
            /tmp/agi-uplift.log
            /tmp/organism.log
            atena_evolution/atena_state.json
          if-no-files-found: ignore
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — probe
  # ════════════════════════════════════════════════════════════════════════════
  probe:
    name: "🌐 Probe"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        probe:
          - query: "melhores APIs para app SaaS com analytics"
            label: "saas-apis"
          - query: "agenda de futebol e resultados do santos"
            label: "futebol"
          - query: "APIs para geração de imagem e mídia"
            label: "media-apis"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1

      - name: Restore venv
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772b3dc2c31
        with:
          path: .venv
          key: ${{ needs.setup.outputs.venv-cache-key }}

      - name: Internet challenge — ${{ matrix.probe.label }}
        id: ic
        continue-on-error: true
        run: |
          set -uo pipefail
          source .venv/bin/activate

          OUT="/tmp/probe-${{ matrix.probe.label }}.json"

          for attempt in 1 2 3; do
            echo "::group::Sonda '${{ matrix.probe.label }}' — tentativa ${attempt}/3"
            python -m core.internet_challenge \
              "${{ matrix.probe.query }}" \
              --cycles 1 \
              > "${OUT}" 2>&1
            EXIT=$?
            echo "::endgroup::"
            [[ ${EXIT} -eq 0 ]] && break
            echo "::warning::Sonda falhou (tentativa ${attempt}). Aguardando $((attempt * 10))s..."
            sleep $((attempt * 10))
          done

          if [[ -f "${OUT}" ]]; then
            python3 -c "
import json
try:
    d = json.loads(open('${OUT}').read())
    wc = d.get('weighted_confidence', d.get('confidence', 'N/A'))
    st = d.get('status', 'unknown')
    print(f'  status={st}  confidence={wc}')
except Exception as e:
    print(f'  (não foi possível parsear resultado: {e})')
"
          fi
          echo "exit_code=${EXIT}" >> "$GITHUB_OUTPUT"

      - name: Upload probe result
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b
        with:
          name: probe-${{ matrix.probe.label }}-${{ github.run_id }}
          path: /tmp/probe-${{ matrix.probe.label }}.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Enforce strict step result
        run: |
          exit ${{ steps.ic.outputs.exit_code || '0' }}

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4 — watchlist
  # ════════════════════════════════════════════════════════════════════════════
  watchlist:
    name: "👁️ Watchlist"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.run_repo_watchlist == 'true'
    permissions:
      contents: read

    outputs:
      status: ${{ steps.wl-status.outputs.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1

      - name: Restore venv
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772b3dc2c31
        with:
          path: .venv
          key: ${{ needs.setup.outputs.venv-cache-key }}

      - name: Scan AI GitHub repos
        id: scan
        continue-on-error: true
        run: |
          set -uo pipefail
          source .venv/bin/activate
          python ./scripts/scan_github_ai_repos.py 2>&1 | tee /tmp/watchlist.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload watchlist log
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b
        with:
          name: watchlist-${{ github.run_id }}
          path: /tmp/watchlist.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Capture watchlist status
        id: wl-status
        run: |
          EXIT=${{ steps.scan.outputs.exit_code || '0' }}
          STATUS=$([[ "${EXIT}" -eq 0 ]] && echo "success" || echo "failure")
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 5 — audit
  # ════════════════════════════════════════════════════════════════════════════
  audit:
    name: "🔍 Audit"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    outputs:
      status: ${{ steps.audit-status.outputs.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1

      - name: Restore venv
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772b3dc2c31
        with:
          path: .venv
          key: ${{ needs.setup.outputs.venv-cache-key }}

      - name: Audit endpoint readiness
        id: audit-endpoint
        continue-on-error: true
        run: |
          bash ./scripts/audit_agent_endpoint_readiness.sh 2>&1 | tee /tmp/audit-endpoint.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Audit repository connectivity
        id: audit-connectivity
        continue-on-error: true
        run: |
          bash ./scripts/audit_repo_connectivity.sh 2>&1 | tee /tmp/audit-connectivity.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Validate delivery workflow
        id: audit-delivery
        continue-on-error: true
        run: |
          bash ./scripts/test_atena_delivery.sh 2>&1 | tee /tmp/audit-delivery.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Annotate failures
        if: >
          steps.audit-endpoint.outputs.exit_code != '0' ||
          steps.audit-connectivity.outputs.exit_code != '0' ||
          steps.audit-delivery.outputs.exit_code != '0'
        run: |
          [[ "${{ steps.audit-endpoint.outputs.exit_code }}" != "0" ]] && \
            echo "::error file=scripts/audit_agent_endpoint_readiness.sh::Endpoint readiness falhou"
          [[ "${{ steps.audit-connectivity.outputs.exit_code }}" != "0" ]] && \
            echo "::error file=scripts/audit_repo_connectivity.sh::Repository connectivity falhou"
          [[ "${{ steps.audit-delivery.outputs.exit_code }}" != "0" ]] && \
            echo "::error file=scripts/test_atena_delivery.sh::Delivery workflow falhou"

      - name: Upload audit logs
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b
        with:
          name: audit-logs-${{ github.run_id }}
          path: |
            /tmp/audit-endpoint.log
            /tmp/audit-connectivity.log
            /tmp/audit-delivery.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Capture audit status
        id: audit-status
        run: |
          EP=${{ steps.audit-endpoint.outputs.exit_code || '0' }}
          CN=${{ steps.audit-connectivity.outputs.exit_code || '0' }}
          DL=${{ steps.audit-delivery.outputs.exit_code || '0' }}
          if [[ "${EP}" -eq 0 && "${CN}" -eq 0 && "${DL}" -eq 0 ]]; then
            STATUS="success"
          elif [[ "${EP}" -eq 0 || "${CN}" -eq 0 || "${DL}" -eq 0 ]]; then
            STATUS="partial"
          else
            STATUS="failure"
          fi
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 6 — commit & summary
  # ════════════════════════════════════════════════════════════════════════════
  commit:
    name: "💾 Commit & Summary"
    needs: [evolve, probe, watchlist, audit]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    env:
      EVOLVE_STATUS:    ${{ needs.evolve.outputs.status    || 'skipped' }}
      PROBE_RESULT:     ${{ needs.probe.result              || 'skipped' }}
      WATCHLIST_STATUS: ${{ needs.watchlist.outputs.status || 'skipped' }}
      AUDIT_STATUS:     ${{ needs.audit.outputs.status     || 'skipped' }}

    steps:
      - name: Checkout (com histórico completo para push)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Stage source changes
        id: stage
        run: |
          git add \
            .github/workflows/ \
            core/ \
            modules/ \
            scripts/ \
            setup/ \
            docs/ \
            tests/ \
            atena \
            .gitignore \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sem mudanças elegíveis para commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Arquivos staged:"
            git diff --cached --name-only | head -30
          fi

      - name: Commit evolution artifacts
        if: steps.stage.outputs.changed == 'true'
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "chore(evolution): cycle ${{ github.run_number }} evolve=${EVOLVE_STATUS} audit=${AUDIT_STATUS} ts=${TS}"

      - name: Push with conflict resolution
        if: steps.stage.outputs.changed == 'true'
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"

          git fetch origin "${BRANCH}" --no-tags

          if ! git rebase --no-edit "origin/${BRANCH}"; then
            echo "::warning::Rebase falhou — tentando resolver mantendo alterações geradas de código"
            git rebase --abort || true
            git merge \
              --no-edit \
              --strategy-option=ours \
              "origin/${BRANCH}" \
              -m "chore(merge): resolve conflict during self-evolution push"
          fi

          git push --force-with-lease origin "HEAD:${BRANCH}"
          echo "✅ Push concluído com sucesso."

      - name: Build rich summary
        if: always()
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          icon() {
            case "$1" in
              success) echo "✅" ;;
              partial)  echo "⚠️" ;;
              failure)  echo "❌" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "❓" ;;
            esac
          }

          {
            echo "## 🔱 ATENA Self-Evolve — Ciclo ${{ github.run_number }}"
            echo ""
            echo "| Campo | Valor |"
            echo "|-------|-------|"
            echo "| Run ID | [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Timestamp UTC | \`${TS}\` |"
            echo ""
            echo "### Resultados por job"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| 🧬 Evolve    | $(icon ${EVOLVE_STATUS})   \`${EVOLVE_STATUS}\`    |"
            echo "| 🌐 Probe     | $(icon ${PROBE_RESULT})   \`${PROBE_RESULT}\`    |"
            echo "| 👁️ Watchlist | $(icon ${WATCHLIST_STATUS}) \`${WATCHLIST_STATUS}\` |"
            echo "| 🔍 Audit     | $(icon ${AUDIT_STATUS})    \`${AUDIT_STATUS}\`     |"
            echo ""

            if [[ -f "atena_evolution/atena_state.json" ]]; then
              echo "### 📊 Estado da evolução"
              echo ""
              python3 << 'EOF'
import json, pathlib
try:
    s = json.loads(pathlib.Path('atena_evolution/atena_state.json').read_text())
    gen = s.get('generation', 'N/A')
    score = s.get('best_score', 'N/A')
    print(f'| Geração | `{gen}` |')
    print(f'| Melhor score | `{score}` |')
except Exception as e:
    print(f'| Estado | Erro ao ler JSON: {e} |')
EOF
              echo ""
            fi

            echo "### 📁 Artefatos gerados"
            echo ""
            for dir in analysis_reports atena_evolution/codex_reports docs; do
              if [[ -d "${dir}" ]]; then
                COUNT=$(find "${dir}" -maxdepth 1 -type f 2>/dev/null | wc -l)
                echo "- \`${dir}/\` — ${COUNT} arquivo(s)"
              fi
            done
            echo ""

            if [[ "${{ steps.stage.outputs.changed }}" == "true" ]]; then
              echo "### 📝 Arquivos commitados"
              echo ""
              echo "\`\`\`"
              git diff HEAD~1 HEAD --name-only 2>/dev/null | head -20 || echo "(não disponível)"
              echo "\`\`\`"
            else
              echo "_Nenhuma mudança de código para commitar neste ciclo._"
            fi

          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload all reports
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b
        with:
          name: atena-reports-${{ github.run_number }}-${{ github.run_id }}
          path: |
            analysis_reports/**
            atena_evolution/codex_reports/**
            docs/ATENA_GO_NO_GO_DAILY_*.md
            docs/IA_TRENDS_2026_REPORT.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Annotate global failure
        if: >
          needs.evolve.outputs.status == 'failure' &&
          needs.audit.outputs.status  == 'failure'
        run: |
          echo "::error::Tanto evolve quanto audit falharam neste ciclo — investigar logs."
          exit 1
