name: ATENA Self-Evolve

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      run_repo_watchlist:
        description: "Executar scanner de repositórios de IA"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: atena-self-evolve
  cancel-in-progress: false

env:
  USER: github-actions
  ATENA_AUTO_ENDPOINT_SETUP: "false"
  ATENA_STRICT_ENDPOINT_READY: "false"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            setup/requirements-pinned.txt
            setup/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r setup/requirements-pinned.txt
          pip install -r setup/requirements-dev.txt

      - name: Run Atena evolution cycle
        continue-on-error: true
        run: |
          set -euo pipefail
          bash ./atena agi-uplift
          bash ./atena digital-organism-live-cycle --iterations 1 --batches 1 --recovery-attempts 1

      - name: Run API scanner evolution probes
        continue-on-error: true
        run: |
          set -euo pipefail
          python -m core.internet_challenge "melhores APIs para app SaaS com analytics"
          python -m core.internet_challenge "agenda de futebol e resultados do santos"
          python -m core.internet_challenge "APIs para geração de imagem e mídia"

      - name: Run AI GitHub repository watchlist refresh
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_repo_watchlist }}
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "Iniciando scanner de repositórios IA junto do workflow..."
          python ./scripts/scan_github_ai_repos.py

      - name: Audit endpoint readiness
        run: ./scripts/audit_agent_endpoint_readiness.sh

      - name: Audit repository connectivity
        run: ./scripts/audit_repo_connectivity.sh

      - name: Validate delivery workflow
        run: ./scripts/test_atena_delivery.sh

      - name: Build workflow summary
        if: always()
        run: |
          {
            echo "## ATENA Self-Evolve Summary"
            echo ""
            echo "- Workflow run: ${{ github.run_id }}"
            echo "- Branch: ${{ github.ref_name }}"
            echo "- Strict endpoint readiness: ${ATENA_STRICT_ENDPOINT_READY}"
            echo "- Timestamp UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "### Available reports"
            ls -1 analysis_reports 2>/dev/null | sed 's/^/- analysis_reports\//g' || echo "- (sem reports em analysis_reports)"
            ls -1 atena_evolution/codex_reports 2>/dev/null | sed 's/^/- atena_evolution\/codex_reports\//g' || echo "- (sem reports em codex_reports)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts (reports)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atena-self-evolve-reports
          path: |
            analysis_reports/**
            atena_evolution/codex_reports/**
            docs/ATENA_GO_NO_GO_DAILY_*.md
            docs/IA_TRENDS_2026_REPORT.md
            docs/RELATORIO_EMPRESARIAL_ATENA_INTERNET_2026-05-04.md
          if-no-files-found: ignore

      - name: Commit and push evolution artifacts
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Evita commitar artefatos voláteis/locais
          git add \
            .github/workflows \
            core \
            modules \
            scripts \
            setup \
            docs \
            tests \
            atena \
            .gitignore
          if git diff --cached --quiet; then
            echo "No eligible source changes to commit."
            exit 0
          fi
          git commit -m "chore(evolution): automated self-evolution cycle"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
